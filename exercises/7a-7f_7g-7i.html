<!DOCTYPE html>
<html>
  <head>
    <title>Function's Exercise</title>
  </head>
  <body>
    <button onclick="
     greet('Othniel');
    ">
      calling function</button>
    <p>
      <!--Exercise 7a-7f-->
      <button onclick="
     const fahrenheit = convertToFahrenheit(20)
     console.log(fahrenheit)
    ">
      Converting To Fahrenheit
    </button>
    <button onclick="
     const celsius = convertToCelsius(86)
     console.log(celsius)
    ">
      Converting To Celsius
    </button>
    <button onclick="
     const result  = convertToTemperature(0,'c')
     console.log(result)
    ">Converting Temperature using units</button>
    </p>
    <p>
      <!--Exercise 7g-7i-->
      <button onclick="
       const length = convertLength(5,'ft','miles')
       console.log(length)
      ">
        Converting Length 
      </button>

    </p>

  </body>
  <script>
    /* Exercise 7a-7f*/
    function greet(name) {
      if (!name) {
        console.log('Hi there')
      } else {
      console.log(`Hello ${name}`)
      }
    }

    function convertToFahrenheit(celsius) {
      return (celsius * 9/5) + 32
    }

    function convertToCelsius(fahrenheit) {
      return (fahrenheit -32) * 5/9
    }

    function convertToTemperature(temp,unit) {
      if (unit === 'C' || unit ==='c') {
        return convertToFahrenheit(temp)
      } else if (unit === 'F' || unit === 'f') {
        return convertToCelsius(temp)
      }
    }

    /* Exercise 7g-7i*/
    function convertLength(length, from,to) {
      const allowedunit = ['miles', 'km', 'ft']
      if (!allowedunit.includes(from) || !allowedunit.includes(to)) {
        return (`Invalid unit. \nConverting from ${from} to ${to} isn't supported `)
      } else {
          if (from === 'miles' && to === 'km') {
            return (`${(length * 1.6).toFixed(2)}${to}`)
          } else if (from === 'km' && to === 'miles') {
            return (`${(length / 1.6).toFixed(2)} ${to}`)
          } else if (from === 'km'&& to === 'ft') {
            return (`${length * 3281}ft`)
          } else if (from === 'miles' && to === 'ft') {
            return (`${length * 5280}${to}`)
          } else if (from === 'ft' || to === 'miles') {
              return (`${(length / 5280).toFixed(7)} ${to}`)
          } else if (from === 'ft' || to === 'km') {
              return (`${(length / 3281).toFixed(7)}${to}`)
            }
          } 
      }
    
  </script>
</html>
