<!DOCTYPE html>
<html>
  <head>
    <title>Simple Calculator</title>
  </head>
  <body>
    <p>
      <button onclick="
        calculator('1')
      ">
       1
      </button>
      <button onclick="
        calculator('2')
      ">
       2
      </button>
      <button onclick="
        calculator('3')
      ">
       3
      </button>
    </p>
    <p>
      <button onclick="
        calculator('4')
      ">
       4
      </button>
      <button onclick="
        calculator('5')
      ">
       5
      </button>

    </p>
    <button onclick="
     calculator(' + ')
    ">
      +
    </button>
    <button onclick="
     calculator('=')
    ">
      =
    </button>
  </body>
  <script>
    let calculation ='' ;

    function calculator(value) {
      if (value != '=') {
        calculation += value
        console.log(calculation)
      } else {
        calculation=eval(calculation);
        console.log(calculation);
      }

    }
  

  </script>
</html>
